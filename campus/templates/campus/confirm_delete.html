{% extends 'campus/base.html' %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="data-card card text-center p-5">
      <i class="bi bi-trash3 text-danger mb-3" style="font-size:3rem"></i>
      <h5 class="fw-bold">Are you sure?</h5>
      <p class="text-muted">You are about to delete <strong>{{ obj }}</strong>. This action cannot be undone.</p>
      <div class="d-flex justify-content-center gap-3 mt-3">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash me-1"></i>Yes, Delete
          </button>
        </form>
        <a href="{% url back_url %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
