{% extends 'campus/base.html' %}
{% block auth_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#8B1A1A 100%);display:flex;align-items:center;justify-content:center;">
  <div style="width:420px;">
    <div class="text-center mb-4">
      <i class="bi bi-buildings-fill" style="font-size:3rem;color:#D4AF37;"></i>
      <h3 class="text-white fw-bold mt-2">LPU Campus Management</h3>
      <p class="text-white-50">Smart AI-Enabled System</p>
    </div>
    <div class="card border-0 rounded-4 shadow-lg p-4">
      <h5 class="fw-bold mb-3 text-center" style="color:#1a1a2e">Sign In</h5>
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-danger py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-lg w-100 text-white fw-bold mt-2" style="background:linear-gradient(135deg,#8B1A1A,#D4AF37);">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
      <p class="text-center text-muted mt-3 mb-0" style="font-size:0.82rem;">Default: admin / admin123</p>
    </div>
  </div>
</div>
{% endblock %}
